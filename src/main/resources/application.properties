spring.application.name=secshare

app.jwt.secret=${JWT_SECRET:RX0ZWU0o/gJpn4t/0MxFYsjgP1fEwrELb+e1lzlHVow=}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

# Optional admin bootstrap: if both are set, an ADMIN account is created on startup.
app.admin.email=${ADMIN_EMAIL:}
app.admin.password=${ADMIN_PASSWORD:}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/secshare}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Batch audience-member inserts so a single share can fan out to thousands of recipients.
spring.jpa.properties.hibernate.jdbc.batch_size=200
spring.jpa.properties.hibernate.order_inserts=true

logging.level.org.springframework.security=${LOG_LEVEL:INFO}
spring.flyway.enabled=false

app.storage.base-path=${STORAGE_PATH:uploads}

# Malware scanning. The built-in scanner always runs. ClamAV is used additionally when
# enabled and reachable; if the daemon is down, scanning degrades to the built-in engine.
app.scan.clamav.enabled=${CLAMAV_ENABLED:false}
app.scan.clamav.host=${CLAMAV_HOST:localhost}
app.scan.clamav.port=${CLAMAV_PORT:3310}
app.scan.clamav.timeout-ms=${CLAMAV_TIMEOUT_MS:5000}

# Self-destruct reaper: purges burn-after-reading links that expired unread.
app.cleanup.enabled=${CLEANUP_ENABLED:true}
app.cleanup.interval-ms=${CLEANUP_INTERVAL_MS:60000}

# Email delivery (optional). When enabled, per-recipient audience links can be mailed out.
# Provider-agnostic: point spring.mail.* at any SMTP host (Gmail, Amazon SES, SendGrid, ...).
# PUBLIC_BASE_URL must be set (e.g. https://secshare.example.com) so links in emails are absolute.
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@secshare.local}
app.mail.batch-size=${MAIL_BATCH_SIZE:50}
app.mail.max-attempts=${MAIL_MAX_ATTEMPTS:5}
app.mail.send-interval-ms=${MAIL_SEND_INTERVAL_MS:30000}
app.public-base-url=${PUBLIC_BASE_URL:}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

server.port=${PORT:8080}
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
